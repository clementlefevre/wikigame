<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikipedia Golf</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        h1 span {
            color: #38bdf8;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .card {
            background: #1e293b;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .5);
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.375rem;
        }

        input[type=text] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.6rem 0.9rem;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color .15s;
            margin-bottom: 1rem;
        }

        input[type=text]:focus {
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 0.5rem;
            padding: 0.7rem 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        #result {
            margin-top: 2rem;
        }

        .error {
            color: #f87171;
            font-size: 0.9rem;
            text-align: center;
        }

        .meta {
            color: #94a3b8;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .path {
            list-style: none;
        }

        .path li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            transition: background .1s;
        }

        .path li:hover {
            background: #0f172a;
        }

        .path li+li::before {
            content: '↓';
            display: block;
            color: #38bdf8;
            font-size: 1.1rem;
            margin-bottom: -0.4rem;
            margin-top: -0.4rem;
            margin-left: 0.75rem;
        }

        .path a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 1rem;
        }

        .path a:hover {
            text-decoration: underline;
        }

        .hop-badge {
            background: #0f172a;
            color: #94a3b8;
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 999px;
            margin-left: auto;
        }

        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>Wikipedia <span>Golf</span></h1>
    <p class="subtitle">Find the shortest path between any two Wikipedia articles.</p>

    <div class="card">
        <label for="from">From</label>
        <input type="text" id="from" placeholder="e.g. Banana" autocomplete="off" />
        <label for="to">To</label>
        <input type="text" id="to" placeholder="e.g. Adolf Hitler" autocomplete="off" />
        <button id="btn" onclick="search()">Find path</button>

        <div id="result"></div>
    </div>

    <script>
        async function search() {
            const btn = document.getElementById('btn');
            const from = document.getElementById('from').value.trim();
            const to = document.getElementById('to').value.trim();
            const out = document.getElementById('result');

            if (!from || !to) { out.innerHTML = '<p class="error">Please fill in both fields.</p>'; return; }

            btn.disabled = true;
            out.innerHTML = '<p style="text-align:center;margin-top:1rem"><span class="spinner"></span>Searching…</p>';

            try {
                const resp = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from, to })
                });
                const data = await resp.json();

                if (data.error) {
                    out.innerHTML = `<p class="error">${data.error}</p>`;
                } else {
                    const hops = data.hops;
                    const ms = data.ms;
                    let html = `<p class="meta">${hops} hop${hops === 1 ? '' : 's'} &nbsp;·&nbsp; ${ms} ms</p><ul class="path">`;
                    data.path.forEach((title, i) => {
                        const url = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(title.replace(/ /g, '_'));
                        html += `<li><a href="${url}" target="_blank" rel="noopener">${title.replace(/_/g, ' ')}</a>
                         <span class="hop-badge">hop ${i}</span></li>`;
                    });
                    html += '</ul>';
                    out.innerHTML = html;
                }
            } catch (e) {
                out.innerHTML = `<p class="error">Request failed: ${e.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        // Allow Enter key
        ['from', 'to'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
        });
    </script>
</body>

</html>
