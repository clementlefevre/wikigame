name: Build graph

on:
  schedule:
    # Weekly on Sundays at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1

jobs:
  build-and-upload:
    name: Build graph and upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build wikigame binary
        run: cargo build --release

      - name: Free disk space
        run: |
          # The build needs ~10 GB download + ~5 GB output on a 14 GB SSD runner.
          # Remove unused preinstalled toolchains/libs to reclaim space.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/powershell /usr/local/share/boost \
                      /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          df -h /

      - name: Download Wikipedia dumps
        run: ./target/release/wikigame download

      - name: Build CSR graph binaries
        run: ./target/release/wikigame build --no-download

      - name: Verify graph files
        run: |
          ls -lh data/processed/
          ./target/release/wikigame search "Banana" "Adolf Hitler" || true

      - name: Configure R2 credentials
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws configure set aws_access_key_id "$R2_ACCESS_KEY"
          aws configure set aws_secret_access_key "$R2_SECRET_KEY"
          aws configure set region auto
          echo "R2_ENDPOINT=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"
          echo "R2_BUCKET=${R2_BUCKET}" >> "$GITHUB_ENV"

      - name: Upload graph files to R2
        run: |
          for f in title_index.bin fwd_offsets.bin fwd_columns.bin bwd_offsets.bin bwd_columns.bin; do
            echo "Uploading $f ..."
            aws s3 cp "data/processed/$f" "s3://${R2_BUCKET}/$f" \
              --endpoint-url "${R2_ENDPOINT}" \
              --expected-size $(stat -c%s "data/processed/$f")
          done

      - name: Write manifest with build date
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > /tmp/manifest.txt
          aws s3 cp /tmp/manifest.txt "s3://${R2_BUCKET}/manifest.txt" \
            --endpoint-url "${R2_ENDPOINT}"

      - name: Summary
        run: |
          echo "### Graph build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded 5 binary files to R2 bucket \`${R2_BUCKET}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Users can now run \`wikigame fetch\` to download them." >> "$GITHUB_STEP_SUMMARY"
